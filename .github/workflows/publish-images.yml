name: publish images

# Builds and publishes the two arena images to GitHub Container Registry (GHCR):
#
#   server/  ->  ghcr.io/infratify/arena-server
#   avatar/  ->  ghcr.io/infratify/arena-avatar
#
# These are the images students pull in Docker 3:
#   docker run ... ghcr.io/infratify/arena-avatar
#
# Publish a pinned release by pushing a version tag:
#   git tag v1.0.0 && git push origin v1.0.0     -> :1.0.0, :1.0, :latest
# Or run it manually from the Actions tab (workflow_dispatch) -> :latest

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read      # checkout
  packages: write     # push to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # one image failing must not cancel the other
      matrix:
        include:
          - name: arena-server
            context: ./server
          - name: arena-avatar
            context: ./avatar

    steps:
      - uses: actions/checkout@v4

      # The GitHub org is "Infratify" (capital I), but GHCR image names must be
      # all lowercase — otherwise `docker push`/`pull` rejects the reference.
      - name: Lowercase registry namespace
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Multi-arch so the cohort's Apple-Silicon (arm64) laptops get native
      # images instead of slow QEMU emulation.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false     # keep the GHCR package listing clean (no unknown/unknown attestation rows)
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
